<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - Dashboard</title>

<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", cursive, sans-serif;
    background: radial-gradient(circle at top, #0a0f1c, #05070d);
    color: #e6f1ff;
    overflow-x: hidden;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #0b1220, #070b14);
    color: #7ecbff;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    box-shadow: 0 0 20px rgba(77,166,255,0.15);
    border-bottom: 1px solid rgba(126,203,255,0.1);
}

/* USER */
.user-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 14px;
    box-shadow: 0 0 10px rgba(77,166,255,0.1);
}

.user-box img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    border: 2px solid #2f8cff;
}

/* ACTION BUTTONS */
.right-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

/* GLOBAL BUTTON GLOW */
button {
    padding: 10px 16px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: 0.3s ease;
    position: relative;
    overflow: hidden;
}

/* glowing pulse */
button::before {
    content: "";
    position: absolute;
    inset: -2px;
    background: linear-gradient(90deg, #4da6ff, #7ecbff, #4da6ff);
    z-index: -1;
    filter: blur(10px);
    opacity: 0.4;
}

/* HOVER GLOW */
button:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 0 20px rgba(126,203,255,0.4);
}

/* SPECIFIC BUTTONS */
.add-btn {
    background: linear-gradient(135deg, #0b2a4a, #0d3a66);
    color: #7ecbff;
    border: 1px solid rgba(126,203,255,0.3);
}

.logout-btn {
    background: linear-gradient(135deg, #2a0b0b, #3a0d0d);
    color: #ff6b6b;
    border: 1px solid rgba(255,107,107,0.3);
}

.bell {
    font-size: 22px;
    filter: drop-shadow(0 0 6px #4da6ff);
}

/* CONTAINER */
.container {
    padding: 15px;
}

h2 {
    font-size: 20px;
    color: #7ecbff;
    text-shadow: 0 0 10px rgba(77,166,255,0.2);
}

/* CARD */
.card {
    background: linear-gradient(135deg, #0b1220, #070b14);
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    margin-bottom: 15px;
    overflow: hidden;
    border-left: 6px solid #2f8cff;
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 25px rgba(77,166,255,0.2);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-content {
    padding: 12px;
}

.price {
    color: #7ecbff;
    font-weight: bold;
}

/* ACTIONS */
.actions {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    gap: 10px;
}

/* EDIT / DELETE */
.edit-btn {
    background: linear-gradient(135deg, #ffb300, #ff9800);
    color: black;
}

.delete-btn {
    background: linear-gradient(135deg, #ff4d4d, #c62828);
    color: white;
}

/* EMPTY */
.empty {
    text-align: center;
    color: #777;
    margin-top: 50px;
}

/* MODAL */
#editModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    padding: 15px;
    backdrop-filter: blur(8px);
}

.modal {
    background: linear-gradient(135deg, #0b1220, #070b14);
    padding: 20px;
    border-radius: 15px;
    width: 100%;
    max-width: 320px;
    border: 1px solid rgba(126,203,255,0.2);
    box-shadow: 0 0 25px rgba(77,166,255,0.15);
}

.modal h3 {
    color: #7ecbff;
}

/* INPUTS */
.modal input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid rgba(126,203,255,0.2);
    background: #0a0f1c;
    color: white;
    outline: none;
}

/* MODAL BUTTONS */
.modal button {
    width: 48%;
    margin-top: 8px;
    background: linear-gradient(135deg, #2f8cff, #4da6ff);
    color: black;
}
</style>
</head>

<body>

<div class="header">

    <div class="user-box">
        <img id="userPic">
        <span id="userName"></span>
    </div>

    <div id="statusBox"></div>

    <div class="right-actions">
        <div class="bell">🔔</div>
        <button class="add-btn" onclick="goAdd()">+ Add Property</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <h2>Your Properties</h2>
    <div id="propertyList"></div>
</div>

<!-- EDIT MODAL -->
<div id="editModal">
    <div class="modal">
        <h3>Edit Property</h3>

        <input id="eName" placeholder="Hostel Name">
        <input id="ePrice" placeholder="Price">
        <input id="eContact" placeholder="Contact">

        <div style="display:flex; justify-content:space-between;">
            <button onclick="saveEdit()">Save</button>
            <button onclick="closeEdit()">Cancel</button>
        </div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { 
    getAuth, 
    onAuthStateChanged, 
    signOut 
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    doc,
    getDoc,
    deleteDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHhaG36nw2uzNiZ1E",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1",
  storageBucket: "unistay-v1.firebasestorage.app",
  messagingSenderId: "125895379967",
  appId: "1:125895379967:web:197892746f83a6bf3cf5ca"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let editId = null;

/* AUTH */
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location = "auth.html";
        return;
    }

    currentUser = user;

    document.getElementById("userName").innerText =
        user.email.split("@")[0];

    document.getElementById("userPic").src =
        "https://via.placeholder.com/35";

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (userSnap.exists()) {
        const status = userSnap.data().status;

        document.getElementById("statusBox").innerText =
            "Status: " + status;

        document.getElementById("statusBox").style.color =
            status === "approved" ? "#7CFF7C" : "#FFD37C";
    }

    loadProperties(user.uid);
});

/* LOAD */
async function loadProperties(uid) {
    const q = query(collection(db, "properties"), where("landlordId", "==", uid));
    const snap = await getDocs(q);

    let data = [];
    snap.forEach(d => data.push({ id: d.id, ...d.data() }));

    render(data);
}

/* RENDER */
function render(properties) {
    let box = document.getElementById("propertyList");
    box.innerHTML = "";

    if (!properties.length) {
        box.innerHTML = `<p class="empty">No properties yet.</p>`;
        return;
    }

    properties.forEach(p => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${p.cover}">
            <div class="card-content">
                <h3>${p.hostelName}</h3>
                <p class="price">UGX ${p.price}</p>
                <p>${p.contact}</p>

                <div class="actions">
                    <button class="edit-btn" onclick="openEdit('${p.id}','${p.hostelName}','${p.price}','${p.contact}')">Edit</button>
                    <button class="delete-btn" onclick="deleteProperty('${p.id}')">Delete</button>
                </div>
            </div>
        `;

        box.appendChild(div);
    });
}

/* DELETE */
window.deleteProperty = async (id) => {
    await deleteDoc(doc(db, "properties", id));
    location.reload();
};

/* EDIT */
window.openEdit = (id, name, price, contact) => {
    editId = id;
    document.getElementById("eName").value = name;
    document.getElementById("ePrice").value = price;
    document.getElementById("eContact").value = contact;
    document.getElementById("editModal").style.display = "flex";
};

window.closeEdit = () => {
    document.getElementById("editModal").style.display = "none";
};

window.saveEdit = async () => {
    await updateDoc(doc(db, "properties", editId), {
        hostelName: document.getElementById("eName").value,
        price: document.getElementById("ePrice").value,
        contact: document.getElementById("eContact").value
    });

    closeEdit();
    location.reload();
};

window.goAdd = () => window.location = "add-property.html";
window.logout = () => signOut(auth).then(() => location = "auth.html");

</script>

</body>
</html>
