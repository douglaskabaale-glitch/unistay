<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - Results</title>

<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", cursive, sans-serif;
    background: linear-gradient(135deg, #dff6ff, #d9ffe8);
    min-height: 100vh;
}

.header {
    background: linear-gradient(90deg, #4da6ff, #2f8cff);
    color: white;
    padding: 14px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.info {
    text-align: center;
    margin-top: 15px;
    font-size: 16px;
    padding: 0 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.25s ease;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

.price {
    color: #2f8cff;
    font-weight: bold;
}

.rating {
    margin-top: 5px;
    font-size: 14px;
    color: #ff9800;
    font-weight: bold;
}

.empty {
    height: 60vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    opacity: 0.5;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<div class="header">UNISTAY - Available Hostels</div>
<div class="info" id="infoText"></div>

<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHhaG36nw2uzNiZ1E",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------------------
   FILTER VALUES (FROM STORAGE)
----------------------------*/
const selectedUniversity = (localStorage.getItem("selectedUniversity") || "").trim();
const selectedLocation = (localStorage.getItem("selectedLocation") || "").trim();

const filterUniversity = (localStorage.getItem("filterUniversity") || "").toLowerCase();
const filterLocation = (localStorage.getItem("filterLocation") || "").toLowerCase();
const filterPrice = parseInt(localStorage.getItem("filterPrice")) || Infinity;
const filterRating = parseInt(localStorage.getItem("filterRating")) || 0;

/* UI INFO */
document.getElementById("infoText").innerText =
`${selectedUniversity} → ${selectedLocation}`;

/* NORMALIZER */
function norm(v) {
    return (v || "").toLowerCase().trim();
}

/* GET REVIEWS */
async function getRating(propertyId) {

    const snap = await getDocs(
        collection(db, "properties", propertyId, "reviews")
    );

    let total = 0;
    let count = 0;

    snap.forEach(doc => {
        total += doc.data().rating || 0;
        count++;
    });

    return {
        avg: count ? (total / count) : 0,
        count
    };
}

/* LOAD */
async function loadResults() {

    const container = document.getElementById("container");
    container.innerHTML = `<div class="empty">Loading hostels...</div>`;

    const snap = await getDocs(collection(db, "properties"));

    let results = [];

    snap.forEach(docSnap => {

        const p = docSnap.data();

        // 🔥 MUST BE APPROVED
        if ((p.status || "pending") !== "approved") return;

        // UNIVERSITY FILTER (from both sources)
        if (filterUniversity && filterUniversity !== "") {
            if (norm(p.university) !== filterUniversity) return;
        } else {
            if (norm(p.university) !== norm(selectedUniversity)) return;
        }

        // LOCATION FILTER
        if (filterLocation && filterLocation !== "") {
            if (!norm(p.location).includes(filterLocation)) return;
        } else {
            if (norm(p.location) !== norm(selectedLocation)) return;
        }

        // PRICE FILTER
        if (p.price && Number(p.price) > filterPrice) return;

        results.push({
            id: docSnap.id,
            ...p
        });
    });

    render(results);
}

/* RENDER */
async function render(results) {

    const container = document.getElementById("container");

    if (!results.length) {
        container.innerHTML = `<div class="empty">No matching hostels found 😢</div>`;
        return;
    }

    const grid = document.createElement("div");
    grid.className = "grid";

    for (let p of results) {

        const ratingData = await getRating(p.id);

        // rating filter
        if (ratingData.avg < filterRating) continue;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${p.cover || ''}" 
                 onerror="this.src='https://via.placeholder.com/300x200'">

            <div class="card-content">
                <h3>${p.hostelName || "Unnamed"}</h3>
                <p>${p.roomType || ""}</p>
                <p class="price">UGX ${p.price || ""}</p>

                <div class="rating">
                    ⭐ ${ratingData.avg.toFixed(1)} (${ratingData.count})
                </div>

                <p>${p.location || ""}</p>
                <p>📞 ${p.contact || ""}</p>
            </div>
        `;

        card.onclick = () => {
            localStorage.setItem("selectedProperty", JSON.stringify(p));
            window.location.href = "hostel-details.html";
        };

        grid.appendChild(card);
    }

    container.innerHTML = "";
    container.appendChild(grid);
}

loadResults();

</script>

</body>
</html>
