<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - List Property</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    overflow-x: hidden;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #4da6ff, #2f8cff);
    color: white;
    padding: 16px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    position: relative;
}

/* USER BOX */
.user-box {
    position: absolute;
    right: 15px;
    top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.2);
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 14px;
}

.user-box img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
}

/* FORM CONTAINER */
.container {
    width: 90%;
    max-width: 450px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
}

textarea {
    resize: none;
    height: 90px;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #4da6ff, #2f8cff);
    border: none;
    color: white;
    border-radius: 999px;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
}

.section-title {
    margin-top: 15px;
    font-weight: bold;
    color: #2f8cff;
}

#locationBox {
    display: none;
}
</style>
</head>

<body>

<div class="header">
    UNISTAY - List Your Property

    <div class="user-box">
        <img id="userPic">
        <span id="userName"></span>
    </div>
</div>

<div class="container">

<h2>Add Hostel Details</h2>

<input type="text" id="hostelName" placeholder="Hostel Name">

<div class="section-title">Closest University</div>
<select id="university" onchange="loadLocations()">
    <option value="">Select University</option>
    <option>Makerere University</option>
    <option>Kyambogo University</option>
    <option>Uganda Christian University</option>
    <option>Nkumba University</option>
    <option>Mbarara University of Science and Technology</option>
</select>

<div id="locationBox">
    <div class="section-title">Location (Near University)</div>
    <select id="location">
        <option value="">Select Location</option>
    </select>
</div>

<select id="roomType">
    <option value="">Select Room Type</option>
    <option value="single">Single Room</option>
    <option value="double">Double Room</option>
</select>

<textarea id="amenities" placeholder="Amenities"></textarea>

<input type="number" id="price" placeholder="Price per month (UGX)">

<div class="section-title">Cover Photo</div>
<input type="file" id="coverInput" accept="image/*">

<div class="section-title">Additional Photos</div>
<input type="file" id="moreInput" multiple accept="image/*">

<div class="section-title">Contact Information</div>

<input type="text" id="contact" placeholder="WhatsApp Number">

<textarea id="description" placeholder="Description (optional)"></textarea>

<button onclick="submitProperty()">Submit Property</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHhaG36nw2uzNiZ1E",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "auth.html";
    currentUser = user;
});

const uniLocations = {
    "Makerere University": ["Kikoni","Wandegeya","Bwaise","Kavule"],
    "Kyambogo University": ["Banda","Ntinda","Naalya"],
    "Uganda Christian University": ["Mukono","Seeta","Namilyango"],
};

window.loadLocations = function () {
    let uni = document.getElementById("university").value;
    let box = document.getElementById("locationBox");
    let select = document.getElementById("location");

    select.innerHTML = '<option value="">Select Location</option>';

    if (!uniLocations[uni]) {
        box.style.display = "none";
        return;
    }

    uniLocations[uni].forEach(loc => {
        let opt = document.createElement("option");
        opt.value = loc;
        opt.textContent = loc;
        select.appendChild(opt);
    });

    box.style.display = "block";
};

window.submitProperty = async function () {

    let name = document.getElementById("hostelName").value;
    let university = document.getElementById("university").value;
    let location = document.getElementById("location").value;
    let room = document.getElementById("roomType").value;
    let amenities = document.getElementById("amenities").value;
    let price = document.getElementById("price").value;
    let contact = document.getElementById("contact").value;
    let desc = document.getElementById("description").value;

    let coverFile = document.getElementById("coverInput").files[0];

    if (!name || !university || !location || !room || !price || !contact || !coverFile) {
        alert("Fill all fields");
        return;
    }

    const upload = async (file) => {
        const url = "https://api.cloudinary.com/v1_1/dsanvos33/image/upload";
        const form = new FormData();
        form.append("file", file);
        form.append("upload_preset", "unistay-images");

        const res = await fetch(url, { method: "POST", body: form });
        return (await res.json()).secure_url;
    };

    const coverURL = await upload(coverFile);

    await addDoc(collection(db, "properties"), {
        hostelName: name,
        university,
        location,
        roomType: room,
        amenities,
        price,
        contact,
        description: desc,
        cover: coverURL,
        landlordId: currentUser.uid,
        createdAt: Date.now(),

        // 🔥 ADMIN APPROVAL FIELD
        status: "pending"
    });

    alert("Submitted for approval!");
    window.location.href = "dashboard.html";
};

</script>

</body>
</html>
