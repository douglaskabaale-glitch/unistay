<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - Add Property</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: radial-gradient(circle at top, #0b1220, #05070f);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}

/* PARTICLES */
.particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

.particle {
    position: absolute;
    font-size: 38px;
    opacity: 0.5;
    color: #00c6ff;
    animation: floatUp linear infinite;
    text-shadow: 0 0 10px rgba(0,198,255,0.4);
}

@keyframes floatUp {
    0% { transform: translateY(110vh); opacity: 0; }
    20% { opacity: 0.7; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* CONTAINER */
.container {
    position: relative;
    z-index: 2;
    width: 92%;
    max-width: 440px;
    background: rgba(15, 20, 35, 0.92);
    backdrop-filter: blur(14px);
    padding: 28px;
    border-radius: 22px;
    box-shadow: 0 0 40px rgba(0,198,255,0.12);
    border: 1px solid rgba(0,198,255,0.12);
}

h2 {
    text-align: center;
    color: #00c6ff;
    margin-bottom: 18px;
    font-size: 22px;
}

.input-group {
    margin-top: 12px;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    outline: none;
    background: rgba(255,255,255,0.05);
    color: white;
    transition: 0.2s;
    appearance: none;
}

/* 🔥 DROPDOWN FIX */
select {
    background-color: rgba(15, 20, 35, 0.95);
    color: white;
}

select option {
    background-color: #0b1220;
    color: white;
}

input:focus, select:focus, textarea:focus {
    border-color: #00c6ff;
    box-shadow: 0 0 0 3px rgba(0,198,255,0.15);
}

textarea {
    height: 85px;
    resize: none;
}

.error {
    color: #ff4d4d;
    font-size: 12px;
    margin-top: 4px;
    display: none;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 0 20px rgba(0,198,255,0.25);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0,198,255,0.45);
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="container">

    <h2>Add Property</h2>

    <div class="input-group">
        <input id="hostelName" placeholder="Hostel Name">
        <div class="error" id="err-hostelName">Field needed</div>
    </div>

    <div class="input-group">
        <select id="university">
            <option value="">Select University</option>
            <option>Makerere University</option>
            <option>Kyambogo University</option>
            <option>Makerere University Business School</option>
            <option>Uganda Christian University</option>
            <option>Victoria University</option>
            <option>Gulu University</option>
            <option>Mbarara University of Science and Technology</option>
            <option>Kabale University</option>
            <option>Kampala International University</option>
            <option>Cavendish University Uganda</option>
        </select>
        <div class="error" id="err-university">Field needed</div>
    </div>

    <div class="input-group">
        <select id="location">
            <option value="">Select Location</option>
        </select>
        <div class="error" id="err-location">Field needed</div>
    </div>

    <div class="input-group">
        <input id="price" type="number" placeholder="Price (UGX)">
        <div class="error" id="err-price">Field needed</div>
    </div>

    <div class="input-group">
        <input id="contact" placeholder="Contact">
        <div class="error" id="err-contact">Field needed</div>
    </div>

    <input id="amenities" placeholder="Amenities (WiFi, Water, Security)">
    <textarea id="description" placeholder="Description"></textarea>

    <div class="input-group">
        <input type="file" id="image">
        <div class="error" id="err-image">Field needed</div>
    </div>

    <button onclick="submitProperty()">Submit Property</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHhaG36nw2uzNiZ1E",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CLOUDINARY */
const upload = async (file) => {
    const url = "https://api.cloudinary.com/v1_1/dsanvos33/image/upload";
    const form = new FormData();
    form.append("file", file);
    form.append("upload_preset", "unistay-images");

    const res = await fetch(url, { method: "POST", body: form });
    const data = await res.json();

    return data.secure_url;
};

/* LOCATION DATA */
const data = {
    "Makerere University": ["Wandegeya","Kikoni","Bwaise","Makerere Hill","Naakulabye"],
    "Kyambogo University": ["Banda","Kiwatule","Ntinda","Naalya","Kyambogo Hill"],
    "Makerere University Business School": ["Nakawa","Bugolobi","Mbuya","Luzira","Kitintale"],
    "Uganda Christian University": ["Mukono","Seeta","Namilyango","Goma","Sonde"],
    "Victoria University": ["Nakasero","Kololo","Kampala Road","Nsambya","CBD"],
    "Gulu University": ["Pece","Bardege","Layibi","Gulu Town","Laroo"],
    "Mbarara University of Science and Technology": ["Kakoba","Nyamitanga","Kamukuzi","Mbarara Town","Katete"],
    "Kabale University": ["Makanga","Kabale Town","Kikungiri","Rushoroza","Nyabikoni"],
    "Kampala International University": ["Kansanga","Ggaba Road","Muyenga","Makindye","Kabalagala"],
    "Cavendish University Uganda": ["Nsambya","Nakasero","Kampala CBD","Wandegeya","Nateete"]
};

/* DROPDOWN */
document.getElementById("university").addEventListener("change", function () {

    const uni = this.value;
    const locationSelect = document.getElementById("location");

    locationSelect.innerHTML = `<option value="">Select Location</option>`;

    if (data[uni]) {
        data[uni].forEach(loc => {
            let opt = document.createElement("option");
            opt.value = loc;
            opt.textContent = loc;
            locationSelect.appendChild(opt);
        });
    }
});

/* VALIDATION + SUBMIT (UNCHANGED) */
function showError(id, show) {
    document.getElementById("err-" + id).style.display = show ? "block" : "none";
}

function validate() {
    let valid = true;

    ["hostelName","university","location","price","contact"].forEach(f => {
        const val = document.getElementById(f).value;
        const empty = !val || val.trim() === "";
        showError(f, empty);
        if (empty) valid = false;
    });

    const file = document.getElementById("image").files[0];

    if (!file) {
        showError("image", true);
        valid = false;
    } else {
        showError("image", false);
    }

    return valid;
}

window.submitProperty = async () => {

    if (!validate()) return;

    const hostelName = document.getElementById("hostelName").value;
    const university = document.getElementById("university").value;
    const location = document.getElementById("location").value;
    const price = document.getElementById("price").value;
    const contact = document.getElementById("contact").value;
    const amenities = document.getElementById("amenities").value;
    const description = document.getElementById("description").value;
    const file = document.getElementById("image").files[0];

    const imageUrl = await upload(file);

    await addDoc(collection(db, "properties"), {
        hostelName,
        university,
        location,
        price,
        contact,
        amenities,
        description,
        cover: imageUrl,
        status: "pending",
        createdAt: Date.now()
    });

    alert("Submitted successfully ✅");
    location.reload();
};

/* PARTICLES */
const symbols = ["∑","√","π","∞","∆","∫","±"];
const box = document.getElementById("particles");

for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.innerText = symbols[Math.floor(Math.random()*symbols.length)];

    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (6 + Math.random()*6) + "s";
    p.style.fontSize = (32 + Math.random()*18) + "px";

    box.appendChild(p);
}

</script>

</body>
</html>
