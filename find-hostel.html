<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - Find Hostel</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: linear-gradient(135deg, #ffffff, #eaf4ff);
    overflow-x: hidden;
}

/* PARTICLES */
.particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

.particle {
    position: absolute;
    font-size: 34px;
    opacity: 0.25;
    color: #4da6ff;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    20% { opacity: 0.4; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 20px 10px;
    position: relative;
    z-index: 2;
}

.header h1 {
    color: #003399;
    font-size: 32px;
}

.header p {
    color: #555;
}

/* FUNNEL FILTER ICON */
.filter-icon {
    position: absolute;
    right: 20px;
    top: 35px;
    font-size: 24px;
    cursor: pointer;
    transition: 0.25s;
}

.filter-icon:hover {
    transform: scale(1.1);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 30px;
    position: relative;
    z-index: 2;
}

/* 💎 PREMIUM GLOSSY CARD */
.card {
    padding: 28px;
    border-radius: 22px;
    cursor: pointer;
    color: white;
    font-weight: 600;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: 0.35s ease;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 15px 35px rgba(0,0,0,0.18);
}

/* glossy shine */
.card::before {
    content: "";
    position: absolute;
    top: -100%;
    left: -40%;
    width: 60%;
    height: 300%;
    background: rgba(255,255,255,0.25);
    transform: rotate(25deg);
    transition: 0.6s;
}

.card:hover::before {
    top: 120%;
}

.card:hover {
    transform: translateY(-6px) scale(1.03);
}

/* 🎨 COLORS */
.makerere { background: linear-gradient(135deg,#001a3a,#002147); }
.kyambogo { background: linear-gradient(135deg,#0046a8,#0057b8); }
.mubs { background: linear-gradient(135deg,#00152a,#001f3f); }
.ucu { background: linear-gradient(135deg,#8b0000,#b00020); }
.victoria { background: linear-gradient(135deg,#163a6b,#1e4d8c); }
.gulu { background: linear-gradient(135deg,#084d2b,#0b6b3a); }
.must { background: linear-gradient(135deg,#0f3d13,#1b5e20); }
.kabale { background: linear-gradient(135deg,#174c35,#1f6f4a); }
.kiu { background: linear-gradient(135deg,#8b1c1c,#c62828); }
.cavendish { background: linear-gradient(135deg,#0d47a1,#1565c0); }

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 5;
}

/* POPUP */
.zoomCard {
    width: 85%;
    max-width: 800px;
    padding: 30px;
    border-radius: 22px;
    color: white;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* AREA BUTTONS */
.area {
    background: rgba(255,255,255,0.18);
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.25s;
}

.area:hover {
    background: rgba(255,255,255,0.3);
    transform: translateX(5px);
}

/* FILTER MODAL */
.filter-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.filter-box {
    width: 90%;
    max-width: 400px;
    padding: 22px;
    border-radius: 18px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.filter-box input,
.filter-box select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
}

.filter-box button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border-radius: 999px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: white;
    color: #0072ff;
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="header">
    <h1>Find Your Hostel</h1>
    <p>Select your university to explore nearby areas</p>
    <div class="filter-icon" onclick="openFilter()">⏳</div>
</div>

<div class="grid" id="uniGrid"></div>

<div class="overlay" id="overlay" onclick="closeOverlay(event)">
    <div class="zoomCard" id="zoomCard">
        <h2 id="title"></h2>
        <div id="areas"></div>
    </div>
</div>

<div id="filterModal" class="filter-overlay" onclick="closeFilter(event)">
    <div class="filter-box">

        <h2>Filter Hostels</h2>

        <label>University</label>
        <select id="filterUniversity"></select>

        <label>Location</label>
        <input id="filterLocation">

        <label>Max Price</label>
        <input id="filterPrice" type="number">

        <label>Min Rating</label>
        <select id="filterRating">
            <option value="">Any</option>
            <option value="1">1+</option>
            <option value="2">2+</option>
            <option value="3">3+</option>
            <option value="4">4+</option>
            <option value="5">5</option>
        </select>

        <button onclick="applyFilters()">Apply Filters</button>

    </div>
</div>

<script>

/* DATA */
const universities = {
    "Makerere University": ["Wandegeya","Kikoni","Bwaise","Kawempe","Makerere Hill"],
    "Kyambogo University": ["Banda","Ntinda","Kiwatule","Naalya","Kyambogo Hill"],
    "Makerere University Business School": ["Nakawa","Bugolobi","Mbuya","Banda","Luzira"],
    "Uganda Christian University": ["Mukono","Seeta","Namilyango","Goma","Wantoni"],
    "Victoria University": ["Nakasero","Kololo","Kampala Road","Nsambya","Bugolobi"],
    "Gulu University": ["Pece","Bardege","Layibi","Gulu Town","Unyama"],
    "Mbarara University of Science and Technology": ["Kakoba","Nyamitanga","Mbarara Town","Kijungu","Nyakayojo"],
    "Kabale University": ["Makanga","Kabale Town","Kikungiri","Rutooma","Kyanamira"],
    "Kampala International University": ["Kansanga","Ggaba Road","Muyenga","Kabalagala","Bukasa"],
    "Cavendish University Uganda": ["Nakasero","Nsambya","City Centre","Kololo","Wandegeya"]
};

const classMap = {
    "Makerere University":"makerere",
    "Kyambogo University":"kyambogo",
    "Makerere University Business School":"mubs",
    "Uganda Christian University":"ucu",
    "Victoria University":"victoria",
    "Gulu University":"gulu",
    "Mbarara University of Science and Technology":"must",
    "Kabale University":"kabale",
    "Kampala International University":"kiu",
    "Cavendish University Uganda":"cavendish"
};

/* BUILD GRID */
const grid = document.getElementById("uniGrid");

Object.keys(universities).forEach(name => {
    const div = document.createElement("div");
    div.className = "card " + classMap[name];
    div.innerText = name;

    div.onclick = () => {
        localStorage.clear();
        openUni(name);
    };

    grid.appendChild(div);
});

/* FILTER DROPDOWN */
const select = document.getElementById("filterUniversity");
select.innerHTML = `<option value="">All</option>`;

Object.keys(universities).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.innerText = name;
    select.appendChild(opt);
});

/* OPEN UNI */
function openUni(name){
    const overlay = document.getElementById("overlay");
    const card = document.getElementById("zoomCard");

    overlay.style.display = "flex";
    card.className = "zoomCard " + classMap[name];

    document.getElementById("title").innerText = name;

    const box = document.getElementById("areas");
    box.innerHTML = "";

    universities[name].forEach(area => {
        let div = document.createElement("div");
        div.className = "area";
        div.innerText = area;

        div.onclick = () => {
            localStorage.setItem("selectedUniversity", name.trim());
            localStorage.setItem("selectedLocation", area.trim());
            window.location.href = "student-results.html";
        };

        box.appendChild(div);
    });
}

/* FILTER */
function applyFilters(){
    localStorage.clear();

    localStorage.setItem("filterUniversity", document.getElementById("filterUniversity").value.trim());
    localStorage.setItem("filterLocation", document.getElementById("filterLocation").value.trim());
    localStorage.setItem("filterPrice", document.getElementById("filterPrice").value);
    localStorage.setItem("filterRating", document.getElementById("filterRating").value);

    window.location.href = "student-results.html";
}

/* MODALS */
function openFilter(){
    document.getElementById("filterModal").style.display = "flex";
}

function closeFilter(e){
    if(e.target.id === "filterModal"){
        document.getElementById("filterModal").style.display = "none";
    }
}

function closeOverlay(e){
    if(e.target.id === "overlay"){
        document.getElementById("overlay").style.display = "none";
    }
}

/* PARTICLES */
const symbols = ["∑","√","π","∞","∆","∫","±"];
const box = document.getElementById("particles");

for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.innerText = symbols[Math.floor(Math.random()*symbols.length)];

    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (6 + Math.random()*6) + "s";

    box.appendChild(p);
}

</script>

</body>
</html>
