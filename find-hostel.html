<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - Find Hostel</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: radial-gradient(circle at top, #0a0f1c, #05070d);
    color: white;
    overflow-x: hidden;
}

/* PARTICLES */
.particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

.particle {
    position: absolute;
    font-size: 30px;
    opacity: 0.25;
    color: #4da6ff;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 0 6px #4da6ff);
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    20% { opacity: 0.4; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 20px 10px;
    position: relative;
    z-index: 2;
}

.header h1 {
    color: #7ecbff;
    font-size: 34px;
    text-shadow: 0 0 15px rgba(126,203,255,0.5);
}

.header p {
    color: #aaa;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 22px;
    padding: 30px;
    position: relative;
    z-index: 2;
}

/* UNIVERSITY CARDS */
.card {
    padding: 28px;
    border-radius: 22px;
    cursor: pointer;
    color: white;
    font-weight: 600;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: 0.35s ease;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

/* glossy shine */
.card::before {
    content: "";
    position: absolute;
    top: -100%;
    left: -40%;
    width: 60%;
    height: 300%;
    background: rgba(255,255,255,0.08);
    transform: rotate(25deg);
    transition: 0.6s;
}

.card:hover::before {
    top: 120%;
}

.card:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 0 30px rgba(77,166,255,0.3);
}

/* COLORS */
.makerere { background: linear-gradient(135deg,#001a3a,#000814); }
.kyambogo { background: linear-gradient(135deg,#001b3a,#000c1f); }
.mubs { background: linear-gradient(135deg,#00152a,#000b18); }
.ucu { background: linear-gradient(135deg,#2a0000,#120000); }
.victoria { background: linear-gradient(135deg,#0b1f3a,#000814); }
.gulu { background: linear-gradient(135deg,#052b18,#00150a); }
.must { background: linear-gradient(135deg,#0b2a0d,#001006); }
.kabale { background: linear-gradient(135deg,#0f2f22,#00150f); }
.kiu { background: linear-gradient(135deg,#2a0a0a,#120000); }
.cavendish { background: linear-gradient(135deg,#081a3a,#000814); }

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 5;
    backdrop-filter: blur(8px);
}

/* POPUP */
.zoomCard {
    width: 85%;
    max-width: 800px;
    padding: 30px;
    border-radius: 22px;
    color: white;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: pop 0.25s ease;
}

@keyframes pop {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* AREAS */
.area {
    background: rgba(255,255,255,0.08);
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.25s;
}

.area:hover {
    background: rgba(126,203,255,0.2);
    transform: translateX(5px);
}

</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="header">
    <h1>Find Your Hostel</h1>
    <p>Select your university to explore nearby areas</p>
</div>

<div class="grid" id="uniGrid"></div>

<div class="overlay" id="overlay" onclick="closeOverlay(event)">
    <div class="zoomCard" id="zoomCard">
        <h2 id="title"></h2>
        <div id="areas"></div>
    </div>
</div>

<script>

/* DATA */
const universities = {
    "Makerere University": ["Wandegeya","Kikoni","Bwaise","Kawempe","Makerere Hill"],
    "Kyambogo University": ["Banda","Ntinda","Kiwatule","Naalya","Kyambogo Hill"],
    "Makerere University Business School": ["Nakawa","Bugolobi","Mbuya","Banda","Luzira"],
    "Uganda Christian University": ["Mukono","Seeta","Namilyango","Goma","Wantoni"],
    "Victoria University": ["Nakasero","Kololo","Kampala Road","Nsambya","Bugolobi"],
    "Gulu University": ["Pece","Bardege","Layibi","Gulu Town","Unyama"],
    "Mbarara University of Science and Technology": ["Kakoba","Nyamitanga","Mbarara Town","Kijungu","Nyakayojo"],
    "Kabale University": ["Makanga","Kabale Town","Kikungiri","Rutooma","Kyanamira"],
    "Kampala International University": ["Kansanga","Ggaba Road","Muyenga","Kabalagala","Bukasa"],
    "Cavendish University Uganda": ["Nakasero","Nsambya","City Centre","Kololo","Wandegeya"]
};

const classMap = {
    "Makerere University":"makerere",
    "Kyambogo University":"kyambogo",
    "Makerere University Business School":"mubs",
    "Uganda Christian University":"ucu",
    "Victoria University":"victoria",
    "Gulu University":"gulu",
    "Mbarara University of Science and Technology":"must",
    "Kabale University":"kabale",
    "Kampala International University":"kiu",
    "Cavendish University Uganda":"cavendish"
};

/* GRID */
const grid = document.getElementById("uniGrid");

Object.keys(universities).forEach(name => {
    const div = document.createElement("div");
    div.className = "card " + classMap[name];
    div.innerText = name;

    div.onclick = () => {
        localStorage.clear();
        openUni(name);
    };

    grid.appendChild(div);
});

/* OPEN UNI */
function openUni(name){
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("zoomCard").className = "zoomCard " + classMap[name];
    document.getElementById("title").innerText = name;

    const box = document.getElementById("areas");
    box.innerHTML = "";

    universities[name].forEach(area => {
        let div = document.createElement("div");
        div.className = "area";
        div.innerText = area;

        div.onclick = () => {
            localStorage.setItem("selectedUniversity", name.trim());
            localStorage.setItem("selectedLocation", area.trim());
            window.location.href = "student-results.html";
        };

        box.appendChild(div);
    });
}

/* CLOSE */
function closeOverlay(e){
    if(e.target.id === "overlay"){
        document.getElementById("overlay").style.display = "none";
    }
}

/* PARTICLES */
const symbols = ["∑","√","π","∞","∆","∫","±"];
const box = document.getElementById("particles");

for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (6 + Math.random()*6) + "s";
    box.appendChild(p);
}

</script>

</body>
</html>
