<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY Admin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f7ff;
    display: flex;
    min-height: 100vh;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 260px;
    background: linear-gradient(180deg, #2f8cff, #1b5fd9);
    color: white;
    padding: 20px;
    position: fixed;
    height: 100vh;
}

.sidebar h2 {
    margin-bottom: 30px;
    font-size: 22px;
}

.nav-item {
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    background: rgba(255,255,255,0.08);
}

.nav-item:hover {
    background: rgba(255,255,255,0.2);
}

/* ================= MAIN ================= */
.main {
    margin-left: 260px;
    width: 100%;
    padding: 20px;
}

/* HEADER */
.header {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    margin-bottom: 20px;
    font-weight: bold;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 15px;
}

/* CARD */
.card {
    background: white;
    border-radius: 14px;
    padding: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* STATUS */
.status {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    display: inline-block;
    margin-top: 8px;
    font-weight: bold;
}

.pending { background: #fff3cd; color: #856404; }
.approved { background: #d4edda; color: #155724; }
.verified { background: #d1f7ff; color: #0077b6; }

/* BUTTONS */
.btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.approve { background: #28a745; color: white; }
.delete { background: #ff4d4d; color: white; }
.verify { background: gold; }
.unverify { background: #555; color: white; }

/* VERIFIED BADGE */
.badge {
    display: inline-flex;
    align-items: center;
    margin-left: 6px;
}

.badge-circle {
    width: 18px;
    height: 18px;
    background: gold;
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 10px rgba(255,215,0,0.8);
}

.check {
    position: absolute;
    top: 0;
    left: 4px;
    font-size: 12px;
    color: #007bff;
    font-weight: 900;
}
</style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
    <h2>UNISTAY ADMIN</h2>

    <div class="nav-item" onclick="showSection('users')">👤 Users</div>
    <div class="nav-item" onclick="showSection('properties')">🏠 Properties</div>
    <div class="nav-item" onclick="logout()">🚪 Logout</div>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <div class="header" id="title">Dashboard</div>

    <!-- USERS -->
    <div id="usersSection">
        <h3>Users Management</h3>
        <div class="grid" id="users"></div>
    </div>

    <!-- PROPERTIES -->
    <div id="propertiesSection" style="display:none;">
        <h3>Property Management</h3>
        <div class="grid" id="properties"></div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
    getFirestore,
    collection,
    getDocs,
    doc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHhaG36nw2uzNiZ1E",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "douglaskabaale@gmail.com";

/* AUTH */
onAuthStateChanged(auth, (user) => {
    if (!user || user.email !== ADMIN_EMAIL) {
        window.location = "auth.html";
    } else {
        loadUsers();
        loadProperties();
    }
});

/* NAV */
window.showSection = (section) => {
    document.getElementById("usersSection").style.display =
        section === "users" ? "block" : "none";

    document.getElementById("propertiesSection").style.display =
        section === "properties" ? "block" : "none";
};

/* USERS */
async function loadUsers() {
    const snap = await getDocs(collection(db, "users"));

    const box = document.getElementById("users");
    box.innerHTML = "";

    snap.forEach(u => {
        const d = u.data();

        const verified = d.status === "verified";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>
                ${d.email || "No email"}

                ${verified ? `
                <span class="badge">
                    <span class="badge-circle"><span class="check">✔</span></span>
                </span>` : ""}
            </h3>

            <p>Status: ${d.status || "pending"}</p>

            <button class="btn verify" onclick="verify('${u.id}')">Verify</button>
            <button class="btn unverify" onclick="unverify('${u.id}')">Unverify</button>
        `;

        box.appendChild(card);
    });
}

/* PROPERTIES */
async function loadProperties() {
    const snap = await getDocs(collection(db, "properties"));

    const box = document.getElementById("properties");
    box.innerHTML = "";

    snap.forEach(p => {
        const d = p.data();

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${d.hostelName}</h3>
            <p>${d.university}</p>

            <span class="status ${d.status || "pending"}">
                ${(d.status || "pending").toUpperCase()}
            </span>

            <button class="btn approve" onclick="approve('${p.id}')">Approve</button>
            <button class="btn delete" onclick="remove('${p.id}')">Delete</button>
        `;

        box.appendChild(card);
    });
}

/* ACTIONS */
window.verify = async (id) => {
    await updateDoc(doc(db,"users",id), { status:"verified" });
    loadUsers();
};

window.unverify = async (id) => {
    await updateDoc(doc(db,"users",id), { status:"approved" });
    loadUsers();
};

window.approve = async (id) => {
    await updateDoc(doc(db,"properties",id), { status:"approved" });
    loadProperties();
};

window.remove = async (id) => {
    await deleteDoc(doc(db,"properties",id));
    loadProperties();
};

window.logout = () => signOut(auth).then(() => window.location="auth.html");

</script>

</body>
</html>
