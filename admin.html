<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY Admin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: radial-gradient(circle at top, #0b1220, #05070d);
    display: flex;
    min-height: 100vh;
    color: #e6f1ff;
    overflow-x: hidden;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 260px;
    background: linear-gradient(180deg, #0f2a55, #081426);
    color: white;
    padding: 20px;
    position: fixed;
    height: 100vh;
    border-right: 1px solid rgba(78,166,255,0.2);
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

.sidebar h2 {
    margin-bottom: 30px;
    font-size: 22px;
    color: #7ecbff;
    text-shadow: 0 0 10px rgba(126,203,255,0.4);
}

.nav-item {
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.25s;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(126,203,255,0.08);
}

.nav-item:hover {
    background: rgba(126,203,255,0.12);
    transform: translateX(4px);
}

/* ================= MAIN ================= */
.main {
    margin-left: 260px;
    width: 100%;
    padding: 20px;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #0f1b2e, #0b1220);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(126,203,255,0.15);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    margin-bottom: 20px;
    font-weight: bold;
    color: #7ecbff;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 15px;
}

/* CARD */
.card {
    background: linear-gradient(135deg, #0e1626, #0b1220);
    border-radius: 14px;
    padding: 15px;
    border: 1px solid rgba(126,203,255,0.1);
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 30px rgba(78,166,255,0.15);
}

/* STATUS */
.status {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    display: inline-block;
    margin-top: 8px;
    font-weight: bold;
}

.pending { background: rgba(255,193,7,0.15); color: #ffd36a; }
.approved { background: rgba(40,167,69,0.15); color: #6effa1; }
.verified { background: rgba(126,203,255,0.15); color: #7ecbff; }

/* BUTTONS */
.btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.25s;
}

.btn:hover {
    transform: scale(1.02);
}

.approve {
    background: linear-gradient(90deg, #00c853, #2ecc71);
    color: black;
}

.delete {
    background: linear-gradient(90deg, #ff4d4d, #c0392b);
    color: white;
}

.verify {
    background: linear-gradient(90deg, #ffd700, #ffb300);
    color: black;
}

.unverify {
    background: #333;
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
}

/* VERIFIED BADGE */
.badge {
    display: inline-flex;
    align-items: center;
    margin-left: 6px;
}

.badge-circle {
    width: 18px;
    height: 18px;
    background: gold;
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 15px rgba(255,215,0,0.7);
}

.check {
    position: absolute;
    top: 0;
    left: 4px;
    font-size: 12px;
    color: #000;
    font-weight: 900;
}

/* 🌌 FLOATING PARTICLES */
.particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}

.particle {
    position: absolute;
    color: #4da6ff;
    opacity: 0.3;
    animation: floatUp linear infinite;
    text-shadow: 0 0 10px #4da6ff;
}

@keyframes floatUp {
    0% { transform: translateY(110vh); opacity: 0; }
    50% { opacity: 0.6; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

.receipts-panel {
    padding: 20px;
    color: #e6f1ff;
}

.receipt-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 15px;
}

/* BASE BUTTON */
.receipt-btn {
    padding: 15px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    color: white;

    backdrop-filter: blur(10px);
    transition: 0.3s;

    box-shadow: 0 0 15px rgba(255,255,255,0.05);
}

/* HOVER EFFECT */
.receipt-btn:hover {
    transform: translateY(-3px) scale(1.03);
}

/* THEMES */
.boost {
    background: linear-gradient(135deg, #3b82f6, #1e3a8a);
    box-shadow: 0 0 20px rgba(59,130,246,0.4);
}

.amplify {
    background: linear-gradient(135deg, #22c55e, #14532d);
    box-shadow: 0 0 20px rgba(34,197,94,0.4);
}

.prime {
    background: linear-gradient(135deg, #a855f7, #3b0764);
    box-shadow: 0 0 20px rgba(168,85,247,0.4);
}

.elite {
    background: linear-gradient(135deg, #facc15, #854d0e);
    color: black;
    box-shadow: 0 0 25px rgba(250,204,21,0.4);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
}

.modal-card {
    background: rgba(10,15,28,0.85);
    padding: 20px;
    border-radius: 16px;
    width: 320px;

    border: 1px solid rgba(126,200,255,0.15);
    box-shadow: 0 0 25px rgba(77,166,255,0.2);
}

.modal-card input {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;

    background: #0a0f1c;
    border: 1px solid rgba(126,200,255,0.2);
    color: white;
}

.generate-btn {
    width: 100%;
    padding: 10px;
    margin-top: 10px;

    background: linear-gradient(135deg, #4da6ff, #7ecbff);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-weight: bold;
}

.close-btn {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border-radius: 999px;
    border: none;
    background: #2a2a2a;
    color: white;
}

</style>
</head>

<body>

<!-- particles -->
<div class="particles" id="particles"></div>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
    <h2>UNISTAY ADMIN</h2>

    <div class="nav-item" onclick="showSection('users')">👤 Users</div>
    <div class="nav-item" onclick="showSection('properties')">🏠 Properties</div>
    <div class="nav-item" onclick="showSection('receipts')">🧾 Receipts</div>

    <div class="nav-item" onclick="logout()">🚪 Logout</div>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <div class="header" id="title">Dashboard</div>

    <!-- USERS -->
    <div id="usersSection">
        <h3>Users Management</h3>
        <div class="grid" id="users"></div>
    </div>

    <!-- PROPERTIES -->
    <div id="propertiesSection" style="display:none;">
        <h3>Property Management</h3>
        <div class="grid" id="properties"></div>
    </div>

    <!-- RECEIPTS (NOW INSIDE MAIN) -->
    <div id="receiptsSection" style="display:none;" class="receipts-panel">

        <h3>Generate Receipts</h3>

        <div class="receipt-grid">

            <button class="receipt-btn boost" onclick="openReceipt('Boost')">
                Boost Receipt
            </button>

            <button class="receipt-btn amplify" onclick="openReceipt('Amplify')">
                Amplify Receipt
            </button>

            <button class="receipt-btn prime" onclick="openReceipt('Prime')">
                Prime Receipt
            </button>

            <button class="receipt-btn elite" onclick="openReceipt('Elite')">
                Elite Receipt
            </button>

        </div>
    </div>

</div>

<div id="receiptModal" class="modal">
    <div class="modal-card">

        <h3 id="receiptTitle">Generate Receipt</h3>

        <input id="rHostel" placeholder="Hostel Name">
        <input id="rDate" type="date">
        <input id="rAmount" placeholder="Funds Paid (UGX)">

        <button class="generate-btn" onclick="generateReceipt()">
            Generate PDF
        </button>

        <button onclick="closeReceipt()" class="close-btn">
            Cancel
        </button>

    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
    getFirestore,
    collection,
    getDocs,
    doc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHhaG36nw2uzNiZ1E",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "douglaskabaale@gmail.com";

/* AUTH (UNCHANGED LOGIC) */
onAuthStateChanged(auth, (user) => {
    if (!user || user.email !== ADMIN_EMAIL) {
        window.location = "auth.html";
    } else {
        loadUsers();
        loadProperties();
    }
});

/* NAV */
window.showSection = (section) => {

    const sections = ["usersSection", "propertiesSection", "receiptsSection"];

    sections.forEach(id => {
        document.getElementById(id).style.display = "none";
    });

    document.getElementById(section + "Section").style.display = "block";
};

/* USERS */
async function loadUsers() {
    const snap = await getDocs(collection(db, "users"));

    const box = document.getElementById("users");
    box.innerHTML = "";

    snap.forEach(u => {
        const d = u.data();

        const verified = d.status === "verified";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>
                ${d.email || "No email"}

                ${verified ? `
                <span class="badge">
                    <span class="badge-circle"><span class="check">✔</span></span>
                </span>` : ""}
            </h3>

            <p>Status: ${d.status || "pending"}</p>

            <button class="btn verify" onclick="verify('${u.id}')">Verify</button>
            <button class="btn unverify" onclick="unverify('${u.id}')">Unverify</button>
        `;

        box.appendChild(card);
    });
}

/* PROPERTIES */
async function loadProperties() {

    const snap = await getDocs(collection(db, "properties"));

    const box = document.getElementById("properties");
    box.innerHTML = "";

    snap.forEach(p => {

        const d = p.data();

        const plan = d.plan || "boost";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${d.hostelName || "Unnamed Hostel"}</h3>

            <p>${d.university || "No University"}</p>

            <p>Plan: ${plan}</p>

            <span class="status ${d.status || "pending"}">
                ${(d.status || "pending").toUpperCase()}
            </span>

            <button class="btn approve" onclick="approve('${p.id}')">
                Approve
            </button>

            <button class="btn delete" onclick="remove('${p.id}')">
                Delete
            </button>
        `;

        box.appendChild(card);

    });
}

/* ACTIONS (UNCHANGED) */
window.verify = async (id) => {
    await updateDoc(doc(db,"users",id), { status:"verified" });
    loadUsers();
};

window.unverify = async (id) => {
    await updateDoc(doc(db,"users",id), { status:"approved" });
    loadUsers();
};

window.approve = async (id) => {
    await updateDoc(doc(db,"properties",id), { status:"approved" });
    loadProperties();
};

window.remove = async (id) => {
    await deleteDoc(doc(db,"properties",id));
    loadProperties();
};

window.logout = () => signOut(auth).then(() => window.location="auth.html");

/* particles */
const symbols = ["✦","✧","✺","✷","∞","+","◆"];
const box = document.getElementById("particles");

for (let i = 0; i < 35; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (6 + Math.random()*6) + "s";
    p.style.fontSize = (16 + Math.random()*18) + "px";
    box.appendChild(p);
}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let selectedPlan = "";


function openReceipt(plan) {
    selectedPlan = plan;
    document.getElementById("receiptTitle").innerText =
        plan + " Subscription Receipt";

    document.getElementById("receiptModal").style.display = "flex";
}

function closeReceipt() {
    document.getElementById("receiptModal").style.display = "none";
}

/* =========================
   PDF GENERATION
========================= */
function generateReceipt() {

    const hostel = document.getElementById("rHostel").value;
    const date = document.getElementById("rDate").value;
    const amount = document.getElementById("rAmount").value;

    if (!hostel || !date || !amount) {
        alert("Fill all fields");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // ===================== COLORS (UNISTAY THEME) =====================
    const blue = [77, 166, 255];
    const dark = [5, 7, 13];
    const green = [0, 200, 83];
    const purple = [168, 85, 247];

    // ===================== HEADER =====================
    doc.setFillColor(...dark);
    doc.rect(0, 0, 210, 40, "F");

    doc.setTextColor(...blue);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(20);
    doc.text("UNISTAY", 14, 20);

    doc.setFontSize(11);
    doc.setTextColor(200, 220, 255);
    doc.text("Premium Hostel Listing Platform", 14, 28);

    doc.setTextColor(255, 255, 255);
    doc.text("OFFICIAL PAYMENT RECEIPT", 140, 20);

    // ===================== RECEIPT ID =====================
    const receiptId = "UNI-" + Math.floor(Math.random() * 99999999);

    doc.setFontSize(10);
    doc.setTextColor(150);
    doc.text("Receipt ID: " + receiptId, 140, 28);

    // ===================== BODY =====================
    doc.setTextColor(30, 30, 30);
    doc.setFontSize(12);

    doc.text("This document serves as an official confirmation of payment received by UNISTAY.", 14, 55);

    doc.setFont("helvetica", "bold");
    doc.text("Hostel Name:", 14, 75);
    doc.text(hostel, 60, 75);

    doc.text("Subscription Plan:", 14, 85);
    doc.text(selectedPlan, 60, 85);

    doc.text("Date of Payment:", 14, 95);
    doc.text(date, 60, 95);

    doc.text("Amount Paid:", 14, 105);
    doc.setTextColor(...green);
    doc.text("UGX " + amount, 60, 105);

    // ===================== PREMIUM MESSAGE =====================
    doc.setTextColor(60, 60, 60);
    doc.setFont("helvetica", "normal");

    doc.text(
        "UNISTAY confirms that the above payment has been successfully received and processed.",
        14,
        125,
        { maxWidth: 180 }
    );

    doc.text(
        "The hostel listing has been upgraded to the selected subscription tier and is now active on the platform.",
        14,
        140,
        { maxWidth: 180 }
    );

    // ===================== FOOTER =====================
    doc.setDrawColor(...blue);
    doc.line(14, 260, 196, 260);

    doc.setFontSize(10);
    doc.setTextColor(120);

    doc.text("Thank you for partnering with UNISTAY.", 14, 270);
    doc.text("This is a system-generated receipt and does not require a signature.", 14, 278);

    doc.save(hostel + "_UNISTAY_Receipt.pdf");

    closeReceipt();
}

</script>

</body>
</html>
