<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY Admin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: radial-gradient(circle at top, #0b1220, #05070d);
    display: flex;
    min-height: 100vh;
    color: #e6f1ff;
    overflow-x: hidden;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 260px;
    background: linear-gradient(180deg, #0f2a55, #081426);
    color: white;
    padding: 20px;
    position: fixed;
    height: 100vh;
    border-right: 1px solid rgba(78,166,255,0.2);
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

.sidebar h2 {
    margin-bottom: 30px;
    font-size: 22px;
    color: #7ecbff;
    text-shadow: 0 0 10px rgba(126,203,255,0.4);
}

.nav-item {
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.25s;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(126,203,255,0.08);
}

.nav-item:hover {
    background: rgba(126,203,255,0.12);
    transform: translateX(4px);
}

/* ================= MAIN ================= */
.main {
    margin-left: 260px;
    width: 100%;
    padding: 20px;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #0f1b2e, #0b1220);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(126,203,255,0.15);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    margin-bottom: 20px;
    font-weight: bold;
    color: #7ecbff;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 15px;
}

/* CARD */
.card {
    background: linear-gradient(135deg, #0e1626, #0b1220);
    border-radius: 14px;
    padding: 15px;
    border: 1px solid rgba(126,203,255,0.1);
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 30px rgba(78,166,255,0.15);
}

/* STATUS */
.status {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    display: inline-block;
    margin-top: 8px;
    font-weight: bold;
}

.pending { background: rgba(255,193,7,0.15); color: #ffd36a; }
.approved { background: rgba(40,167,69,0.15); color: #6effa1; }
.verified { background: rgba(126,203,255,0.15); color: #7ecbff; }

/* BUTTONS */
.btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.25s;
}

.btn:hover {
    transform: scale(1.02);
}

.approve {
    background: linear-gradient(90deg, #00c853, #2ecc71);
    color: black;
}

.delete {
    background: linear-gradient(90deg, #ff4d4d, #c0392b);
    color: white;
}

.verify {
    background: linear-gradient(90deg, #ffd700, #ffb300);
    color: black;
}

.unverify {
    background: #333;
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
}

/* VERIFIED BADGE */
.badge {
    display: inline-flex;
    align-items: center;
    margin-left: 6px;
}

.badge-circle {
    width: 18px;
    height: 18px;
    background: gold;
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 15px rgba(255,215,0,0.7);
}

.check {
    position: absolute;
    top: 0;
    left: 4px;
    font-size: 12px;
    color: #000;
    font-weight: 900;
}

/* 🌌 FLOATING PARTICLES */
.particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}

.particle {
    position: absolute;
    color: #4da6ff;
    opacity: 0.3;
    animation: floatUp linear infinite;
    text-shadow: 0 0 10px #4da6ff;
}

@keyframes floatUp {
    0% { transform: translateY(110vh); opacity: 0; }
    50% { opacity: 0.6; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- particles -->
<div class="particles" id="particles"></div>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
    <h2>UNISTAY ADMIN</h2>

    <div class="nav-item" onclick="showSection('users')">👤 Users</div>
    <div class="nav-item" onclick="showSection('properties')">🏠 Properties</div>
    <div class="nav-item" onclick="logout()">🚪 Logout</div>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <div class="header" id="title">Dashboard</div>

    <!-- USERS -->
    <div id="usersSection">
        <h3>Users Management</h3>
        <div class="grid" id="users"></div>
    </div>

    <!-- PROPERTIES -->
    <div id="propertiesSection" style="display:none;">
        <h3>Property Management</h3>
        <div class="grid" id="properties"></div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
    getFirestore,
    collection,
    getDocs,
    doc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHhaG36nw2uzNiZ1E",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "douglaskabaale@gmail.com";

/* AUTH (UNCHANGED LOGIC) */
onAuthStateChanged(auth, (user) => {
    if (!user || user.email !== ADMIN_EMAIL) {
        window.location = "auth.html";
    } else {
        loadUsers();
        loadProperties();
    }
});

/* NAV */
window.showSection = (section) => {
    document.getElementById("usersSection").style.display =
        section === "users" ? "block" : "none";

    document.getElementById("propertiesSection").style.display =
        section === "properties" ? "block" : "none";
};

/* USERS */
async function loadUsers() {
    const snap = await getDocs(collection(db, "users"));

    const box = document.getElementById("users");
    box.innerHTML = "";

    snap.forEach(u => {
        const d = u.data();

        const verified = d.status === "verified";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>
                ${d.email || "No email"}

                ${verified ? `
                <span class="badge">
                    <span class="badge-circle"><span class="check">✔</span></span>
                </span>` : ""}
            </h3>

            <p>Status: ${d.status || "pending"}</p>

            <button class="btn verify" onclick="verify('${u.id}')">Verify</button>
            <button class="btn unverify" onclick="unverify('${u.id}')">Unverify</button>
        `;

        box.appendChild(card);
    });
}

/* PROPERTIES */
async function loadProperties() {
    const snap = await getDocs(collection(db, "properties"));

    const box = document.getElementById("properties");
    box.innerHTML = "";

    snap.forEach(p => {
        const d = p.data();

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${d.hostelName}</h3>
            <p>${d.university}</p>

            <span class="status ${d.status || "pending"}">
                ${(d.status || "pending").toUpperCase()}
            </span>

            <button class="btn approve" onclick="approve('${p.id}')">Approve</button>
            <button class="btn delete" onclick="remove('${p.id}')">Delete</button>
        `;

        box.appendChild(card);
    });
}

/* ACTIONS (UNCHANGED) */
window.verify = async (id) => {
    await updateDoc(doc(db,"users",id), { status:"verified" });
    loadUsers();
};

window.unverify = async (id) => {
    await updateDoc(doc(db,"users",id), { status:"approved" });
    loadUsers();
};

window.approve = async (id) => {
    await updateDoc(doc(db,"properties",id), { status:"approved" });
    loadProperties();
};

window.remove = async (id) => {
    await deleteDoc(doc(db,"properties",id));
    loadProperties();
};

window.logout = () => signOut(auth).then(() => window.location="auth.html");

/* particles */
const symbols = ["✦","✧","✺","✷","∞","+","◆"];
const box = document.getElementById("particles");

for (let i = 0; i < 35; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (6 + Math.random()*6) + "s";
    p.style.fontSize = (16 + Math.random()*18) + "px";
    box.appendChild(p);
}

</script>

</body>
</html>
