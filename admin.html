<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e8f3ff, #f7fbff);
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #2f8cff, #4da6ff);
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    padding: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* STATUS */
.status {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 999px;
    display: inline-block;
    margin-top: 5px;
}

.pending { background: #fff3cd; color: #856404; }
.approved { background: #d4edda; color: #155724; }

/* BUTTONS */
.btn {
    margin-top: 8px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.approve {
    background: linear-gradient(90deg, #28a745, #218838);
    color: white;
}

.delete {
    background: linear-gradient(90deg, #ff4d4d, #ff2f2f);
    color: white;
}
</style>
</head>

<body>

<div class="header">UNISTAY ADMIN DASHBOARD 🔐</div>

<div id="listings" class="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
    getFirestore,
    collection,
    getDocs,
    deleteDoc,
    doc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHhaG36nw2uzNiZ1E",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "douglaskabaale@gmail.com";

let allListings = [];

/* AUTH */
onAuthStateChanged(auth, (user) => {
    if (!user || user.email !== ADMIN_EMAIL) {
        alert("Access denied 🚫");
        window.location.href = "auth.html";
        return;
    }
    loadListings();
});

/* LOAD DATA */
async function loadListings() {

    const snap = await getDocs(collection(db, "properties"));

    allListings = [];

    snap.forEach(docSnap => {
        const data = docSnap.data();
        data.id = docSnap.id;
        allListings.push(data);
    });

    render();
}

/* RENDER */
function render() {

    const container = document.getElementById("listings");
    container.innerHTML = "";

    allListings.forEach(data => {

        const status = data.status || "approved";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${data.hostelName}</h3>
            <p>📍 ${data.university}</p>
            <p>📌 ${data.location}</p>
            <p>💰 UGX ${data.price}</p>

            <span class="status ${status}">
                ${status.toUpperCase()}
            </span>

            ${
                status === "pending"
                ? `<button class="btn approve" onclick="approve('${data.id}')">
                        Approve
                   </button>`
                : ""
            }

            <button class="btn delete" onclick="deleteListing('${data.id}')">
                Delete
            </button>
        `;

        container.appendChild(card);
    });
}

/* APPROVE */
window.approve = async function(id) {
    await updateDoc(doc(db, "properties", id), {
        status: "approved"
    });

    loadListings();
};

/* DELETE */
window.deleteListing = async function(id) {
    await deleteDoc(doc(db, "properties", id));
    loadListings();
};

</script>

</body>
</html>
