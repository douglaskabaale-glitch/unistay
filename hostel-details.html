<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - Hostel Details</title>

<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", cursive, sans-serif;
    background: linear-gradient(135deg, #e6f4ff, #e9ffe9);
    min-height: 100vh;
    animation: pageLoad 0.6s ease-out;
}

@keyframes pageLoad {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.header {
    background: linear-gradient(90deg, #4da6ff, #2f8cff);
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.main-img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 18px;
}

.gallery {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    overflow-x: auto;
}

.gallery img {
    width: 120px;
    height: 90px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
}

.card {
    background: white;
    padding: 22px;
    border-radius: 18px;
    margin-top: 15px;
}

.title {
    font-size: 26px;
    font-weight: bold;
    color: #2f8cff;
}

.info {
    margin: 6px 0;
}

.book-btn {
    margin-top: 18px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(90deg, #25d366, #128c7e);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

/* REVIEWS */
.reviews-box {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 18px;
}

.review {
    background: #f4f9ff;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}

/* ⭐ AVERAGE RATING */
.avg-rating {
    font-weight: bold;
    color: #ff9800;
    margin-bottom: 10px;
}

.particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}

.particle {
    position: absolute;
    color: #7ec8ff;
    font-size: 24px;
    opacity: 0.35;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    100% { transform: translateY(-120vh); opacity: 0; }
}

.header, .container {
    position: relative;
    z-index: 2;
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="header">Hostel Details</div>

<div class="container">

    <img id="mainImage" class="main-img">

    <div class="gallery" id="gallery"></div>

    <div class="card">
        <div class="title" id="name"></div>

        <div class="info" id="price"></div>
        <div class="info" id="room"></div>
        <div class="info" id="location"></div>
        <div class="info" id="amenities"></div>
        <div class="info" id="contact"></div>
        <div class="info" id="desc"></div>

        <button class="book-btn" onclick="bookNow()">BOOK NOW ON WHATSAPP</button>
    </div>

    <!-- REVIEWS -->
    <div class="reviews-box">

        <h3>Reviews</h3>

        <div id="avgRating" class="avg-rating">No ratings yet</div>

        <input id="rating" type="number" min="1" max="5" placeholder="Rating (1-5)" style="width:100%; padding:10px; margin-bottom:10px;">

        <textarea id="reviewText" placeholder="Write your review..." style="width:100%; padding:10px; height:80px;"></textarea>

        <button onclick="submitReview()" style="margin-top:10px; width:100%; padding:10px; background:#2f8cff; color:white; border:none;">
            Submit Review
        </button>

        <div id="reviewsContainer"></div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHHhaG36nw2uzNiE",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* PROPERTY */
let property = JSON.parse(localStorage.getItem("selectedProperty"));

if (!property) {
    alert("No property selected!");
    window.location.href = "student-results.html";
}

/* DISPLAY */
document.getElementById("mainImage").src = property.cover;
document.getElementById("name").innerText = property.hostelName;
document.getElementById("price").innerText = "UGX " + property.price;
document.getElementById("room").innerText = "Room: " + property.roomType;
document.getElementById("location").innerText = "Location: " + property.location;
document.getElementById("amenities").innerText = "Amenities: " + property.amenities;
document.getElementById("contact").innerText = "Contact: " + property.contact;
document.getElementById("desc").innerText = property.description || "";

/* GALLERY */
let gallery = document.getElementById("gallery");

(property.images || []).forEach(img => {
    let image = document.createElement("img");
    image.src = img;
    image.onclick = () => {
        document.getElementById("mainImage").src = img;
    };
    gallery.appendChild(image);
});

/* WHATSAPP */
window.bookNow = function () {
    let phone = property.contact.replace(/\s+/g, '');
    if (!phone.startsWith("+")) phone = "+256" + phone;

    let message = `Hello, I am interested in your hostel: ${property.hostelName}`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, "_blank");
};

/* ⭐ SUBMIT REVIEW */
window.submitReview = async function () {

    const rating = Number(document.getElementById("rating").value);
    const text = document.getElementById("reviewText").value.trim();

    if (!rating || rating < 1 || rating > 5 || !text) {
        alert("Enter valid rating (1-5) and review");
        return;
    }

    await addDoc(collection(db, "properties", property.id, "reviews"), {
        rating,
        text,
        createdAt: serverTimestamp()
    });

    document.getElementById("rating").value = "";
    document.getElementById("reviewText").value = "";

    loadReviews();
};

/* ⭐ LOAD REVIEWS + AVERAGE */
async function loadReviews() {

    const snap = await getDocs(collection(db, "properties", property.id, "reviews"));

    let reviews = [];
    let total = 0;

    snap.forEach(doc => {
        const r = doc.data();
        reviews.push(r);
        total += r.rating;
    });

    // average rating
    const avg = reviews.length ? (total / reviews.length).toFixed(1) : 0;

    document.getElementById("avgRating").innerText =
        reviews.length ? `⭐ Average Rating: ${avg} / 5 (${reviews.length} reviews)` : "No ratings yet";

    // newest first
    reviews.reverse();

    let html = "";
    reviews.forEach(r => {
        html += `
            <div class="review">
                ⭐ ${r.rating}/5
                <p>${r.text}</p>
            </div>
        `;
    });

    document.getElementById("reviewsContainer").innerHTML = html;
}

loadReviews();

/* PARTICLES */
const symbols = ["π","Σ","√","∫","θ","x²","∞","Δ"];

function createParticles(){
    const container = document.getElementById("particles");

    for (let i = 0; i < 30; i++) {
        let s = document.createElement("div");
        s.className = "particle";
        s.innerText = symbols[Math.floor(Math.random() * symbols.length)];

        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        s.style.fontSize = (18 + Math.random() * 22) + "px";
        s.style.animationDuration = (8 + Math.random() * 10) + "s";

        container.appendChild(s);
    }
}

createParticles();

</script>

</body>
</html>
