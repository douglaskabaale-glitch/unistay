<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - Hostel Details</title>

<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", cursive, sans-serif;
    background: linear-gradient(135deg, #e6f4ff, #e9ffe9);
    min-height: 100vh;

    /* 🌟 smooth page entry */
    animation: pageLoad 0.6s ease-out;
}

@keyframes pageLoad {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #4da6ff, #2f8cff);
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* MAIN IMAGE */
.main-img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    transition: 0.3s ease;
}

.main-img:hover {
    transform: scale(1.01);
}

/* GALLERY */
.gallery {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    overflow-x: auto;
    padding-bottom: 5px;
}

.gallery img {
    width: 120px;
    height: 90px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
}

.gallery img:hover {
    transform: scale(1.08);
}

/* INFO CARD (PREMIUM) */
.card {
    background: white;
    padding: 22px;
    border-radius: 18px;
    margin-top: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-4px);
}

/* TITLE */
.title {
    font-size: 26px;
    font-weight: bold;
    color: #2f8cff;
    margin-bottom: 10px;
}

/* INFO TEXT */
.info {
    margin: 6px 0;
    color: #333;
    font-size: 15px;
}

/* BOOK BUTTON (PREMIUM GREEN) */
.book-btn {
    margin-top: 18px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(90deg, #25d366, #128c7e);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
    position: relative;
    overflow: hidden;
}

/* button glow hover */
.book-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 15px 35px rgba(37, 211, 102, 0.5);
}

/* shimmer effect */
.book-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.2);
    transform: skewX(-20deg);
}

.book-btn:hover::after {
    animation: shine 0.7s ease;
}

@keyframes shine {
    from { left: -100%; }
    to { left: 100%; }
}

/* 🌟 FLOATING PARTICLES */
.particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}

.particle {
    position: absolute;
    color: #7ec8ff;
    font-size: 24px;
    opacity: 0.35;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh);
        opacity: 0;
    }
    10% { opacity: 0.4; }
    100% {
        transform: translateY(-120vh);
        opacity: 0;
    }
}

/* keep UI above particles */
.header, .container {
    position: relative;
    z-index: 2;
}
</style>
</head>

<body>

<!-- 🌟 PARTICLES -->
<div class="particles" id="particles"></div>

<div class="header">
    Hostel Details
</div>

<div class="container">

    <img id="mainImage" class="main-img">

    <div class="gallery" id="gallery"></div>

    <div class="card">
        <div class="title" id="name"></div>

        <div class="info" id="price"></div>
        <div class="info" id="room"></div>
        <div class="info" id="location"></div>
        <div class="info" id="amenities"></div>
        <div class="info" id="contact"></div>
        <div class="info" id="desc"></div>

        <button class="book-btn" onclick="bookNow()">BOOK NOW ON WHATSAPP</button>
    </div>

</div>

<script>

/* GET PROPERTY */
let property = JSON.parse(localStorage.getItem("selectedProperty"));

if (!property) {
    alert("No property selected!");
    window.location.href = "student-results.html";
}

/* MAIN IMAGE */
document.getElementById("mainImage").src = property.cover;

/* DETAILS */
document.getElementById("name").innerText = property.hostelName;
document.getElementById("price").innerText = "UGX " + property.price;
document.getElementById("room").innerText = "Room: " + property.roomType;
document.getElementById("location").innerText = "Location: " + property.location;
document.getElementById("amenities").innerText = "Amenities: " + property.amenities;
document.getElementById("contact").innerText = "Contact: " + property.contact;
document.getElementById("desc").innerText = property.description || "";

/* GALLERY */
let gallery = document.getElementById("gallery");

(property.images || []).forEach(img => {
    let image = document.createElement("img");
    image.src = img;

    image.onclick = () => {
        document.getElementById("mainImage").src = img;
    };

    gallery.appendChild(image);
});

/* WHATSAPP */
function bookNow() {

    let phone = property.contact.replace(/\s+/g, '');

    if (!phone.startsWith("+")) {
        phone = "+256" + phone;
    }

    let message = `Hello, I am interested in your hostel: ${property.hostelName}`;

    let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}

/* 🌟 PARTICLES */
const symbols = ["π","Σ","√","∫","θ","x²","∞","Δ"];

function createParticles(){
    const container = document.getElementById("particles");

    for (let i = 0; i < 30; i++) {
        let s = document.createElement("div");
        s.className = "particle";
        s.innerText = symbols[Math.floor(Math.random() * symbols.length)];

        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        s.style.fontSize = (18 + Math.random() * 22) + "px";
        s.style.animationDuration = (8 + Math.random() * 10) + "s";
        s.style.opacity = Math.random() * 0.4;

        container.appendChild(s);
    }
}

createParticles();

</script>

</body>
</html>
