<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - Hostel Details</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0a0f1c, #05070d);
    min-height: 100vh;
    color: #e6f1ff;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #0d1b2a, #111c33);
    color: #7ec8ff;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 12px rgba(126,200,255,0.4);
    box-shadow: 0 0 20px rgba(77,166,255,0.15);
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* MAIN IMAGE */
.main-img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 18px;
    box-shadow:
        0 0 25px rgba(77,166,255,0.25),
        0 12px 30px rgba(0,0,0,0.6);
    border: 1px solid rgba(126,200,255,0.15);
}

/* GALLERY */
.gallery {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    overflow-x: auto;
}

.gallery img {
    width: 120px;
    height: 90px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid rgba(126,200,255,0.15);
    box-shadow: 0 0 10px rgba(77,166,255,0.15);
}

/* CARD */
.card {
    background: rgba(10, 14, 28, 0.9);
    padding: 20px;
    border-radius: 18px;
    margin-top: 15px;
    box-shadow:
        0 0 25px rgba(0,0,0,0.6),
        0 0 40px rgba(77,166,255,0.08);
    border: 1px solid rgba(126,200,255,0.08);
}

/* TITLE */
.title {
    font-size: 26px;
    font-weight: bold;
    color: #7ec8ff;
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(126,200,255,0.3);
}

/* DETAILS GRID */
.details-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
}

/* DETAIL BOX */
.detail-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(126,200,255,0.1);
    padding: 14px;
    border-radius: 14px;
    transition: 0.2s;
    box-shadow: 0 0 12px rgba(77,166,255,0.05);
}

.detail-box:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 18px rgba(77,166,255,0.18);
}

/* LABEL */
.label {
    font-size: 12px;
    text-transform: uppercase;
    color: #9bbbd4;
    margin-bottom: 5px;
    letter-spacing: 1px;
}

/* VALUE */
.value {
    font-size: 16px;
    font-weight: 600;
    color: #e6f1ff;
}

/* PRICE BOX */
.price-box {
    background: linear-gradient(135deg, #0d1b2a, #112240);
    border: 1px solid rgba(126,200,255,0.2);
    box-shadow: 0 0 20px rgba(77,166,255,0.15);
}

.price-box .label {
    color: #7ec8ff;
}

.price-box .value {
    color: #7ec8ff;
    font-size: 20px;
    text-shadow: 0 0 8px rgba(126,200,255,0.4);
}

/* TAGS */
.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag {
    background: linear-gradient(135deg, #1b2a44, #0f1a2b);
    color: #7ec8ff;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    border: 1px solid rgba(126,200,255,0.15);
    box-shadow: 0 0 10px rgba(77,166,255,0.1);
}

/* BOOK BUTTON (GLOWING) */
.book-btn {
    margin-top: 18px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(90deg, #00e676, #00c853);
    color: #000;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;

    box-shadow:
        0 0 15px rgba(0,230,118,0.4),
        0 0 35px rgba(0,200,83,0.25);
}

.book-btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow:
        0 0 25px rgba(0,230,118,0.6),
        0 0 50px rgba(0,200,83,0.35);
}

/* SHINE EFFECT */
.book-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.25);
    transform: skewX(-25deg);
    transition: 0.6s;
}

.book-btn:hover::after {
    left: 130%;
}

/* REVIEWS */
.reviews-box {
    margin-top: 25px;
    background: rgba(10, 14, 28, 0.9);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    border: 1px solid rgba(126,200,255,0.1);
}

.reviews-box h3 {
    margin-bottom: 12px;
    color: #7ec8ff;
}

.avg-rating {
    font-weight: bold;
    color: #ffd166;
    margin-bottom: 15px;
    background: rgba(255,209,102,0.08);
    padding: 10px;
    border-radius: 12px;
    display: inline-block;
}

/* REVIEW CARD */
.review {
    background: rgba(255,255,255,0.04);
    padding: 14px;
    margin-top: 12px;
    border-radius: 14px;
    border-left: 4px solid #7ec8ff;
    box-shadow: 0 0 12px rgba(77,166,255,0.08);
}

.review p {
    margin-top: 6px;
    color: #cbd5e1;
    font-size: 14px;
}

/* PARTICLES */
.particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}

.particle {
    position: absolute;
    color: #7ec8ff;
    font-size: 24px;
    opacity: 0.35;
    text-shadow: 0 0 10px rgba(126,200,255,0.5);
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    100% { transform: translateY(-120vh); opacity: 0; }
}

.header, .container {
    position: relative;
    z-index: 2;
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="header">Hostel Details</div>

<div class="container">

    <img id="mainImage" class="main-img">

    <div class="gallery" id="gallery"></div>

    <div class="card">
        <div class="title" id="name"></div>

        <div class="details-grid">

            <div class="detail-box price-box">
                <div class="label">Price</div>
                <div class="value" id="price"></div>
            </div>

            <div class="detail-box">
                <div class="label">Room Type</div>
                <div class="value" id="room"></div>
            </div>

            <div class="detail-box">
                <div class="label">Location</div>
                <div class="value" id="location"></div>
            </div>

            <div class="detail-box">
                <div class="label">Amenities</div>
                <div class="tags" id="amenities"></div>
            </div>

            <div class="detail-box">
                <div class="label">Contact</div>
                <div class="value" id="contact"></div>
            </div>

            <div class="detail-box">
                <div class="label">Description</div>
                <div class="value" id="desc"></div>
            </div>

        </div>

        <button class="book-btn" onclick="bookNow()">BOOK NOW ON WHATSAPP</button>
    </div>

    <div class="reviews-box">
        <h3>Reviews</h3>

        <div id="avgRating" class="avg-rating">Loading reviews...</div>

        <input id="rating" type="number" min="1" max="5"
               placeholder="Rating (1-5)"
               style="width:100%; padding:10px; margin-bottom:10px; background:#0f172a; color:white; border:1px solid rgba(126,200,255,0.2); border-radius:10px;">

        <textarea id="reviewText"
                  placeholder="Write your review..."
                  style="width:100%; padding:10px; height:80px; background:#0f172a; color:white; border:1px solid rgba(126,200,255,0.2); border-radius:10px;"></textarea>

        <button onclick="submitReview()"
                style="margin-top:10px; width:100%; padding:10px; background:linear-gradient(90deg,#4da6ff,#7ec8ff); color:black; border:none; border-radius:10px; font-weight:bold;">
            Submit Review
        </button>

        <div id="reviewsContainer"></div>
    </div>

</div>

<script type="module">
/* 🔥 YOUR ORIGINAL LOGIC UNCHANGED */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHHhaG36nw2uzNiE",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let property = JSON.parse(localStorage.getItem("selectedProperty"));

if (!property || !property.id) {
    alert("Missing hostel data");
    window.location.href = "student-results.html";
}

function renderProperty() {

    document.getElementById("mainImage").src = property.cover || "";
    document.getElementById("name").innerText = property.hostelName || "";
    document.getElementById("price").innerText = "UGX " + (property.price || "");
    document.getElementById("room").innerText = property.roomType || "";
    document.getElementById("location").innerText = property.location || "";
    document.getElementById("contact").innerText = property.contact || "";
    document.getElementById("desc").innerText = property.description || "";

    document.getElementById("amenities").innerHTML =
        (property.amenities || "")
        .split(",")
        .map(a => `<span class="tag">${a.trim()}</span>`)
        .join("");
}

renderProperty();

window.bookNow = function () {
    let phone = (property.contact || "").replace(/\s+/g, '');
    if (!phone.startsWith("+")) phone = "+256" + phone;

    window.open(`https://wa.me/${phone}?text=Hello, interested in ${property.hostelName}`, "_blank");
};

window.submitReview = async function () {

    const rating = Number(document.getElementById("rating").value);
    const text = document.getElementById("reviewText").value;

    if (!rating || !text) return alert("Invalid input");

    await addDoc(collection(db, "properties", property.id, "reviews"), {
        rating,
        text,
        createdAt: serverTimestamp()
    });

    loadReviews();
};

async function loadReviews() {

    const snap = await getDocs(collection(db, "properties", property.id, "reviews"));

    let reviews = [];
    let total = 0;

    snap.forEach(doc => {
        const r = doc.data();
        reviews.push(r);
        total += r.rating || 0;
    });

    const avg = reviews.length ? (total / reviews.length).toFixed(1) : 0;

    document.getElementById("avgRating").innerText =
        reviews.length ? `⭐ ${avg} / 5 (${reviews.length})` : "No reviews yet";

    document.getElementById("reviewsContainer").innerHTML =
        reviews.map(r => `
            <div class="review">
                ⭐ ${r.rating}/5
                <p>${r.text}</p>
            </div>
        `).join("");
}

loadReviews();

/* particles unchanged */
const symbols = ["π","Σ","√","∫","θ","∞","Δ"];
const container = document.getElementById("particles");

for (let i = 0; i < 30; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.innerText = symbols[Math.floor(Math.random()*symbols.length)];

    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (6 + Math.random()*6) + "s";

    container.appendChild(p);
}
</script>

</body>
</html>
