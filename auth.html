<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISTAY - Access</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0b1220, #05070f);
    overflow: hidden;
    color: white;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #1b3cff, #00c6ff);
    color: white;
    padding: 16px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    position: relative;
    z-index: 2;
    box-shadow: 0 0 20px rgba(0,198,255,0.4);
}

/* CONTAINER */
.container {
    width: 400px;
    margin: 70px auto;
    background: rgba(15, 20, 35, 0.9);
    padding: 28px;
    border-radius: 18px;
    box-shadow: 0 0 30px rgba(0,198,255,0.15);
    position: relative;
    z-index: 2;
    backdrop-filter: blur(10px);
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    margin: 7px 0;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #1b3cff, #00c6ff);
    border: none;
    color: white;
    border-radius: 999px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 15px rgba(0,198,255,0.4);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 25px rgba(0,198,255,0.7);
}

/* SWITCH */
.switch {
    text-align: center;
    margin-top: 10px;
    color: #00c6ff;
    cursor: pointer;
}

/* STRONG / MEDIUM TEXT */
#strength {
    font-size: 13px;
    margin-top: -5px;
    margin-bottom: 5px;
}

/* PROFILE PREVIEW */
#preview {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin: 10px auto;
    display: block;
    object-fit: cover;
    border: 2px solid #00c6ff;
}

/* FILE LABEL */
.file-label {
    display: block;
    background: linear-gradient(90deg, #1b3cff, #00c6ff);
    color: white;
    padding: 10px;
    border-radius: 999px;
    text-align: center;
    cursor: pointer;
    margin: 10px 0;
    font-weight: bold;
}

.file-label input {
    display: none;
}

/* FLOATING SYMBOLS */
.symbol {
    position: absolute;
    font-size: 18px;
    color: rgba(0,198,255,0.15);
    animation: float 12s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* MESSAGE */
#msg {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">UNISTAY</div>

<div class="container">

<div id="loginForm">
    <h2>Login</h2>
    <input type="text" id="loginUser" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="switch" onclick="showSignup()">Create account</div>
</div>

<div id="signupForm" style="display:none;">
    <h2>Create Account</h2>

    <input type="text" id="signupUser" placeholder="Username">

    <label class="file-label" id="fileLabel">
        Choose Profile Picture
        <input type="file" id="profilePic" accept="image/*" onchange="loadImage(event)">
    </label>

    <img id="preview" src="" style="display:none;">

    <input type="text" id="signupContact" placeholder="Email">

    <input type="password" id="signupPass" placeholder="Password" oninput="checkStrength()">
    <div id="strength"></div>

    <input type="password" id="confirmPass" placeholder="Confirm Password">

    <p style="text-align:center; color:#aaa; font-size:14px;">
        Account Type: <strong>Landlord</strong>
    </p>

    <button onclick="signup()">Sign Up</button>
    <div class="switch" onclick="showLogin()">Back to login</div>
</div>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* KEEP YOUR ORIGINAL CONFIG (UNCHANGED) */
const firebaseConfig = {
  apiKey: "AIzaSyCwDxwL4j_fgzGi1ffHhaG36nw2uzNiZ1E",
  authDomain: "unistay-v1.firebaseapp.com",
  projectId: "unistay-v1",
  storageBucket: "unistay-v1.firebasestorage.app",
  messagingSenderId: "125895379967",
  appId: "1:125895379967:web:197892746f83a6bf3cf5ca"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* FLOATING SYMBOLS */
const symbols = ["π","Σ","√","∫","θ","x²","∞","Δ"];

for (let i = 0; i < 35; i++) {
    let s = document.createElement("div");
    s.className = "symbol";
    s.innerText = symbols[Math.floor(Math.random() * symbols.length)];
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (6 + Math.random() * 10) + "s";
    s.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(s);
}

/* MESSAGE */
function showMessage(text, color="red") {
    let msg = document.getElementById("msg");
    msg.style.color = color;
    msg.innerText = text;
}

/* NAV */
window.showSignup = function() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("signupForm").style.display = "block";
    showMessage("");
}

window.showLogin = function() {
    document.getElementById("signupForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
    showMessage("");
}

/* IMAGE */
let profileBase64 = "";

window.loadImage = function(event) {
    let reader = new FileReader();
    reader.onload = function () {
        profileBase64 = reader.result;

        let img = document.getElementById("preview");
        img.src = profileBase64;
        img.style.display = "block";

        document.getElementById("fileLabel").innerText = "Image Selected ✅";
    };
    reader.readAsDataURL(event.target.files[0]);
}

/* PASSWORD STRENGTH */
window.checkStrength = function() {
    let pass = document.getElementById("signupPass").value;
    let strength = document.getElementById("strength");

    if (pass.length < 4) {
        strength.innerText = "Weak";
        strength.style.color = "#ff4d4d";
    } else if (pass.length < 8) {
        strength.innerText = "Medium";
        strength.style.color = "orange";
    } else {
        strength.innerText = "Strong";
        strength.style.color = "#00ff99";
    }
}

/* SIGNUP (UNCHANGED LOGIC) */
window.signup = async function() {
    let email = document.getElementById("signupContact").value.trim();
    let pass = document.getElementById("signupPass").value.trim();
    let confirm = document.getElementById("confirmPass").value.trim();
    let username = document.getElementById("signupUser").value.trim();

    if (!email || !pass || !confirm || !username) {
        showMessage("All fields are required!");
        return;
    }

    if (pass !== confirm) {
        showMessage("Passwords do not match!");
        return;
    }

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
            name: username,
            email: email,
            role: "landlord",
            status: "pending",
            profileImage: profileBase64 || null,
            createdAt: new Date()
        });

        showMessage("Account created successfully!", "#00ff99");

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);

    } catch (error) {
        showMessage(error.message);
    }
}

/* LOGIN (UNCHANGED LOGIC) */
window.login = async function() {
    let email = document.getElementById("loginUser").value.trim();
    let pass = document.getElementById("loginPass").value.trim();

    if (!email || !pass) {
        showMessage("Please fill in all login fields!");
        return;
    }

    try {
        await signInWithEmailAndPassword(auth, email, pass);

        showMessage("Login successful!", "#00ff99");

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 800);

    } catch (error) {
        showMessage("Invalid login!");
    }
}

</script>

</body>
</html>
